services:

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./Backend
    environment:
      MONGO_URI: mongodb://mongo:27017/eventhorizon
      JWT_ACCESS_SECRET: your_secret
      JWT_REFRESH_SECRET: your_refresh_secret
    container_name: event_backend
    ports:
      - "4000:4000"
    # env_file:
    #   - ./Backend/.env
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - ./Backend/uploads:/app/uploads
    depends_on:
      - mongo 

  frontend:
    build: 
      context: ./Frontend
      args:
        VITE_API_URL: http://localhost:4000
    container_name: event_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data: