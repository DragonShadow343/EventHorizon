services:
  backend:
    build: ./Backend
    container_name: event_backend
    ports:
      - "4000:4000"
    env_file:
      - ./Backend/.env
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - ./Backend/uploads:/app/uploads

  frontend:
    build: 
      context: ./Frontend
      args:
        VITE_API_URL: http://localhost:4000
    container_name: event_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend